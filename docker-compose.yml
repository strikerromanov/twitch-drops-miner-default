services:
  twitch-drops-farmer:
    build: .
    container_name: twitch-drops-farmer
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  default:
    name: twitch-farmer-network
