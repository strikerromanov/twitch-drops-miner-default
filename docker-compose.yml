services:
  twitch-drops-miner:
    build: .
    container_name: twitch-drops-miner
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persist the SQLite database across container restarts/rebuilds
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/app/data
      # Optional: set your Twitch Client ID here instead of via the Settings UI
      # - TWITCH_CLIENT_ID=your_client_id_here
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
